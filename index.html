  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0A0C10; color: #E2E8F0; margin: 0; }
    
    /* Input Styling */
    input[type="range"] { -webkit-appearance: none; appearance: none; background: #1C2330; height: 6px; border-radius: 4px; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #C9A84C; cursor: pointer; }
    .input-field { background: #0A0C10; border: 1px solid #1C2330; border-radius: 6px; padding: 6px 12px; color: #E2E8F0; font-size: 12px; outline: none; }
    .input-field:focus { border-color: #C9A84C; }
    
    /* Component Core CSS */
    .card { background: #11151D; border: 1px solid #1F2633; border-radius: 12px; }
    .card-accent { background: #11151D; border: 1px solid #C9A84C88; border-radius: 12px; }
    .section-title { color: #F1F5F9; font-size: 24px; font-weight: 700; margin: 0; }
    
    .kpi-card { background: #11151D; border: 1px solid #1F2633; border-radius: 12px; padding: 16px; transition: all 0.2s ease; }
    .kpi-card:hover { border-color: #2E3A4E; transform: translateY(-2px); }
    .stat-number { font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 700; color: #F1F5F9; }
    
    .badge { display: inline-flex; items-center; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    .badge-up { background: #22C55E22; color: #22C55E; }
    .badge-down { background: #EF444422; color: #EF4444; }
    
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; color: #64748B; cursor: pointer; transition: all 0.2s ease; margin-bottom: 4px; }
    .nav-item:hover { background: #151A24; color: #E2E8F0; }
    .nav-item.active { background: #C9A84C; color: #0A0C10; }
    
    .pulse-dot { width: 8px; height: 8px; background: #22C55E; border-radius: 50%; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); animation: pulse 2s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
    
    .table-row:hover { background-color: #151A24; }
    .slide-in { animation: fadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    
    .btn-primary { background-color: #C9A84C; color: #0A0C10; font-weight: 600; font-size: 13px; padding: 8px 16px; border-radius: 6px; transition: opacity 0.15s ease; cursor: pointer;}
    .btn-primary:hover { opacity: 0.9; }
    .btn-ghost { background: transparent; border: 1px solid #2E3A4E; color: #94A3B8; font-weight: 500; font-size: 13px; padding: 8px 16px; border-radius: 6px; transition: all 0.15s ease; cursor: pointer;}
    .btn-ghost:hover { background: #1C2330; color: #F1F5F9; }
    .upload-zone { border: 2px dashed #2E3A4E; transition: all 0.2s ease; }
    .upload-zone.drag-over, .upload-zone:hover { border-color: #C9A84C; background: #C9A84C05; }
    
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0A0C10; }
    ::-webkit-scrollbar-thumb { background: #1C2330; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #2E3A4E; }
  </style>
</head>

  <script type="text/babel">
    const { useState, useEffect, useContext, createContext, useMemo, useRef } = React;

    // --- ICON ENGINE ---
    const ICON_PATHS = {

      DollarSign: "M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6",

      X: "M18 6L6 18 M6 6l12 12",

      RefreshCw: "M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"
    };

    function Icon({ name, size = 24, color = "currentColor", style, className }) {
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style} className={className}>
          <path d={ICON_PATHS[name]} />
        </svg>
      );
    }

    // --- MOCK DATA ---
    const CHANNELS = ['Meta Ads', 'Google Ads', 'Organic', 'Referral'];
    const CAMPAIGNS = ['Assotech Celeste Launch', 'Luxury Villa Campaign', 'Year-End Offer', 'Diwali Special', 'Q1 Brand Push', 'Google Search – Noida', 'Remarketing Wave', 'Organic SEO', 'Channel Partners', 'Word of Mouth'];
    const PROJECTS = ['Assotech Celeste', 'Assotech Park Xii', 'Assotech Business Cresterra', 'Assotech Windsor Park'];
    const fmt = (n) => parseFloat(n.toFixed(2));

    const monthlyData = [
      { month: 'Jan 24', leads: 412, siteVisits: 187, bookings: 28, revenue: 8.4, adSpend: 1.8, channel: 'Meta Ads' },
      { month: 'Feb 24', leads: 387, siteVisits: 201, bookings: 31, revenue: 9.3, adSpend: 1.9, channel: 'Google Ads' },
      { month: 'Mar 24', leads: 520, siteVisits: 248, bookings: 42, revenue: 12.6, adSpend: 2.4, channel: 'Meta Ads' },
      { month: 'Apr 24', leads: 461, siteVisits: 218, bookings: 35, revenue: 10.5, adSpend: 2.1, channel: 'Organic' },
      { month: 'May 24', leads: 498, siteVisits: 235, bookings: 38, revenue: 11.4, adSpend: 2.2, channel: 'Google Ads' },
      { month: 'Jun 24', leads: 543, siteVisits: 267, bookings: 44, revenue: 13.2, adSpend: 2.5, channel: 'Meta Ads' },
      { month: 'Jul 24', leads: 476, siteVisits: 221, bookings: 36, revenue: 10.8, adSpend: 2.0, channel: 'Referral' },
      { month: 'Aug 24', leads: 508, siteVisits: 244, bookings: 40, revenue: 12.0, adSpend: 2.3, channel: 'Google Ads' },
      { month: 'Sep 24', leads: 582, siteVisits: 289, bookings: 51, revenue: 15.3, adSpend: 2.7, channel: 'Meta Ads' },
      { month: 'Oct 24', leads: 641, siteVisits: 320, bookings: 58, revenue: 17.4, adSpend: 3.1, channel: 'Meta Ads' },
      { month: 'Nov 24', leads: 714, siteVisits: 367, bookings: 67, revenue: 20.1, adSpend: 3.4, channel: 'Google Ads' },
      { month: 'Dec 24', leads: 780, siteVisits: 410, bookings: 74, revenue: 22.2, adSpend: 3.8, channel: 'Meta Ads' },
    ];

    const channelData = [
      { channel: 'Meta Ads', leads: 2180, siteVisits: 960, bookings: 162, revenue: 48.6, adSpend: 14.2, ctr: 3.8, cpc: 65, cpm: 248, cpl: 652, color: '#3B82F6' },
      { channel: 'Google Ads', leads: 1640, siteVisits: 820, bookings: 148, revenue: 44.4, adSpend: 12.8, ctr: 4.2, cpc: 78, cpm: 328, cpl: 780, color: '#22C55E' },
      { channel: 'Organic', leads: 890, siteVisits: 520, bookings: 87, revenue: 26.1, adSpend: 0, ctr: 0, cpc: 0, cpm: 0, cpl: 0, color: '#C9A84C' },
      { channel: 'Referral', leads: 402, siteVisits: 260, bookings: 47, revenue: 14.1, adSpend: 1.2, ctr: 0, cpc: 0, cpm: 0, cpl: 298, color: '#A855F7' },
    ];

    const funnelData = [
      { stage: 'Leads Generated', count: 5112, pct: 100, drop: 0, color: '#3B82F6' },
      { stage: 'Qualified Leads', count: 3580, pct: 70.0, drop: 30.0, color: '#6366F1' },
      { stage: 'Site Visits', count: 2560, pct: 50.1, drop: 19.9, color: '#8B5CF6' },
      { stage: 'Negotiations', count: 980, pct: 19.2, drop: 30.9, color: '#A855F7' },
      { stage: 'Bookings', count: 444, pct: 8.7, drop: 10.5, color: '#C9A84C' },
      { stage: 'Revenue Realized', count: 312, pct: 6.1, drop: 2.6, color: '#E8C96A' },
    ];

    const campaignData = [
      { campaign: 'Assotech Celeste Launch', channel: 'Meta Ads', leads: 842, bookings: 68, revenue: 20.4, spend: 5.6, roas: 3.64, cpl: 665, status: 'Active' },
      { campaign: 'Google Search – Noida', channel: 'Google Ads', leads: 621, bookings: 54, revenue: 16.2, spend: 4.8, roas: 3.38, cpl: 773, status: 'Active' },
      { campaign: 'Diwali Special', channel: 'Meta Ads', leads: 540, bookings: 48, revenue: 14.4, spend: 3.8, roas: 3.79, cpl: 704, status: 'Ended' },
      { campaign: 'Year-End Offer', channel: 'Google Ads', leads: 480, bookings: 41, revenue: 12.3, spend: 3.2, roas: 3.84, cpl: 667, status: 'Active' },
      { campaign: 'Remarketing Wave', channel: 'Meta Ads', leads: 398, bookings: 46, revenue: 13.8, spend: 3.0, roas: 4.60, cpl: 754, status: 'Active' },
      { campaign: 'Luxury Villa Campaign', channel: 'Meta Ads', leads: 280, bookings: 34, revenue: 10.2, spend: 2.4, roas: 4.25, cpl: 857, status: 'Paused' },
      { campaign: 'Channel Partners', channel: 'Referral', leads: 402, bookings: 47, revenue: 14.1, spend: 1.2, roas: 11.75, cpl: 298, status: 'Active' },
      { campaign: 'Organic SEO', channel: 'Organic', leads: 890, bookings: 87, revenue: 26.1, spend: 0, roas: null, cpl: 0, status: 'Active' },
      { campaign: 'Q1 Brand Push', channel: 'Google Ads', leads: 320, bookings: 28, revenue: 8.4, spend: 2.8, roas: 3.00, cpl: 875, status: 'Ended' },
    ];

    const attributionFlow = [
      { from: 'Meta Ads', to: 'Assotech Celeste', value: 82 },
      { from: 'Meta Ads', to: 'Park Xii', value: 48 },
      { from: 'Meta Ads', to: 'Windsor Park', value: 32 },
      { from: 'Google Ads', to: 'Assotech Celeste', value: 64 },
      { from: 'Google Ads', to: 'Business Cresterra', value: 54 },
      { from: 'Google Ads', to: 'Park Xii', value: 30 },
      { from: 'Organic', to: 'Assotech Celeste', value: 40 },
      { from: 'Organic', to: 'Business Cresterra', value: 28 },
      { from: 'Organic', to: 'Windsor Park', value: 19 },
      { from: 'Referral', to: 'Assotech Celeste', value: 28 },
      { from: 'Referral', to: 'Windsor Park', value: 19 },
    ];

    const leakageData = [
      { stage: 'Lead → Qualified', total: 5112, lost: 1532, lostPct: 30.0, reason: 'Unresponsive / Not Serious' },
      { stage: 'Qualified → Site Visit', total: 3580, lost: 1020, lostPct: 28.5, reason: 'Location / Price Mismatch' },
      { stage: 'Site Visit → Negotiation', total: 2560, lost: 1580, lostPct: 61.7, reason: 'Budget Constraint' },
      { stage: 'Negotiation → Booking', total: 980, lost: 536, lostPct: 54.7, reason: 'Competitor Offer / Delay' },
      { stage: 'Booking → Revenue', total: 444, lost: 132, lostPct: 29.7, reason: 'Loan Rejection / Withdrawal' },
    ];

    const kpiSummary = {
      totalLeads: 5112, totalBookings: 444, totalRevenue: 133.2, conversionRate: 8.68,
      totalAdSpend: 28.2, roas: 4.18, avgCAC: 63514, avgBookingValue: 3000000,
      mom_leads: 8.5, mom_bookings: 10.4, mom_revenue: 10.4, mom_conversion: 1.8,
    };

    function generateForecast(data, months = 3) {
      const window = 3;
      const lastN = data.slice(-window);
      const avgGrowth = lastN.reduce((acc, d, i) => {
        if (i === 0) return acc;
        return acc + (d.revenue - lastN[i - 1].revenue) / lastN[i - 1].revenue;
      }, 0) / (window - 1);

      const forecast = [];
      const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      let last = data[data.length - 1];
      let lastMonthIdx = monthNames.indexOf(last.month.split(' ')[0]);
      let lastYear = parseInt(last.month.split(' ')[1]);

      for (let i = 1; i <= months; i++) {
        const idx = (lastMonthIdx + i) % 12;
        const yr = lastMonthIdx + i >= 12 ? lastYear + 1 : lastYear;
        const baseRevenue = last.revenue * Math.pow(1 + avgGrowth, i);
        forecast.push({
          month: `${monthNames[idx]} ${yr}`, revenue: fmt(baseRevenue),
          leads: Math.round(last.leads * Math.pow(1 + avgGrowth * 0.8, i)),
          bookings: Math.round(last.bookings * Math.pow(1 + avgGrowth * 0.85, i)),
          forecast: true,
        });
      }
      return forecast;
    }

    const allMonthlyData = [...monthlyData, ...generateForecast(monthlyData)];


    // --- CONTEXT ENGINE ---
    const DashboardContext = createContext(null);

    function DashboardProvider({ children }) {
      const [activeModule, setActiveModule] = useState('overview');
      const [filterChannel, setFilterChannel] = useState('All');
      const [filterDateRange, setFilterDateRange] = useState('All Time');
      const [uploadedData, setUploadedData] = useState(null);
      const [scenarioBudget, setScenarioBudget] = useState(28.2);
      const [scenarioConvRate, setScenarioConvRate] = useState(8.68);
      const [scenarioLeadVol, setScenarioLeadVol] = useState(5112);
      const [budgetAllocation, setBudgetAllocation] = useState({
        'Meta Ads': 40, 'Google Ads': 35, 'Organic': 15, 'Referral': 10,
      });

      const data = useMemo(() => {
        const base = uploadedData || { monthly: monthlyData, channels: channelData, campaigns: campaignData };
        let monthly = base.monthly || monthlyData;
        let channels = base.channels || channelData;
        let campaigns = base.campaigns || campaignData;

        if (filterChannel !== 'All') {
          channels = channels.filter(c => c.channel === filterChannel);
          campaigns = campaigns.filter(c => c.channel === filterChannel);
        }

        return { monthly, channels, campaigns, funnel: funnelData, leakage: leakageData, allMonthly: allMonthlyData };
      }, [uploadedData, filterChannel, filterDateRange]);

      const kpis = useMemo(() => {
        const channels = data.channels;
        const totalLeads = channels.reduce((s, c) => s + c.leads, 0);
        const totalBookings = channels.reduce((s, c) => s + c.bookings, 0);
        const totalRevenue = channels.reduce((s, c) => s + c.revenue, 0);
        const totalSpend = channels.reduce((s, c) => s + c.adSpend, 0);
        return {
          totalLeads, totalBookings,
          totalRevenue: parseFloat(totalRevenue.toFixed(1)),
          conversionRate: parseFloat(((totalBookings / (totalLeads || 1)) * 100).toFixed(2)),
          totalAdSpend: parseFloat(totalSpend.toFixed(1)),
          roas: totalSpend > 0 ? parseFloat((totalRevenue / totalSpend).toFixed(2)) : 0,
          avgCAC: totalBookings > 0 ? Math.round((totalSpend * 1e7) / totalBookings) : 0,
          mom_leads: kpiSummary.mom_leads, mom_bookings: kpiSummary.mom_bookings,
          mom_revenue: kpiSummary.mom_revenue, mom_conversion: kpiSummary.mom_conversion,
        };
      }, [data.channels]);

      const scenarioKPIs = useMemo(() => {
        const projectedBookings = Math.round(scenarioLeadVol * scenarioConvRate / 100);
        const avgRevenuePerBooking = 3.0; // crore
        const projectedRevenue = parseFloat((projectedBookings * avgRevenuePerBooking).toFixed(1));
        const projectedROAS = scenarioBudget > 0 ? parseFloat((projectedRevenue / scenarioBudget).toFixed(2)) : 0;
        return { projectedLeads: scenarioLeadVol, projectedBookings, projectedRevenue, projectedROAS };
      }, [scenarioBudget, scenarioConvRate, scenarioLeadVol]);

      return (
        <DashboardContext.Provider value={{
          activeModule, setActiveModule, filterChannel, setFilterChannel,
          filterDateRange, setFilterDateRange, uploadedData, setUploadedData,
          data, kpis, scenarioBudget, setScenarioBudget, scenarioConvRate, setScenarioConvRate,
          scenarioLeadVol, setScenarioLeadVol, scenarioKPIs, budgetAllocation, setBudgetAllocation,
        }}>
          {children}
        </DashboardContext.Provider>
      );
    }

    const useDashboard = () => useContext(DashboardContext);


    // --- UI COMPONENTS ---
    function Card({ children, className = '', style = {}, accent = false }) {
      return <div className={`${accent ? 'card-accent' : 'card'} ${className}`} style={{ padding: 20, ...style }}>{children}</div>;
    }

    function SectionTitle({ children, sub }) {
      return (
        <div style={{ marginBottom: 20 }}>
          <h2 className="section-title">{children}</h2>
          {sub && <p style={{ color: '#475569', fontSize: 12, marginTop: 4 }}>{sub}</p>}
        </div>
      );
    }

    function KPICard({ label, value, delta, sub, icon, format = 'auto', color = '#C9A84C' }) {
      const isUp = delta >= 0;
      const fmt = (v) => {
        if (format === 'currency') return `₹${v} Cr`;
        if (format === 'pct') return `${v}%`;
        if (format === 'inr') return `₹${v.toLocaleString('en-IN')}`;
        if (typeof v === 'number' && v > 9999) return v.toLocaleString('en-IN');
        return v;
      };
      return (
        <div className="kpi-card">
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 12 }}>
            <span style={{ color: '#475569', fontSize: 11, fontWeight: 600, letterSpacing: '0.05em' }}>{label}</span>
            {icon && <Icon name={icon} size={16} color={color} />}
          </div>
          <div className="stat-number" style={{ marginBottom: 8 }}>{fmt(value)}</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            {delta !== undefined && (
              <span className={`badge ${isUp ? 'badge-up' : 'badge-down'}`}>
                {isUp ? '▲' : '▼'} {Math.abs(delta)}% MoM
              </span>
            )}
            {sub && <span style={{ color: '#475569', fontSize: 11 }}>{sub}</span>}
          </div>
        </div>
      );
    }

    function Tag({ children, color = '#C9A84C' }) {
      return (

    function KPIChip({ label, value, delta, format = 'number' }) {
      const isUp = delta >= 0;
      const fmt = (v) => {
        if (format === 'currency') return `₹${v}Cr`;
        if (format === 'pct') return `${v}%`;
        return v.toLocaleString('en-IN');
      };
      return (
        <div style={{ display: 'flex', flexDirection: 'column', padding: '0 18px', borderRight: '1px solid #1C2330' }}>
          <span style={{ color: '#475569', fontSize: 10, fontWeight: 500, letterSpacing: '0.05em', marginBottom: 2 }}>{label}</span>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 16, fontWeight: 500, color: '#F1F5F9' }}>{fmt(value)}</span>
            <span style={{ display: 'flex', alignItems: 'center', gap: 2, fontSize: 10, fontWeight: 600, color: isUp ? '#22C55E' : '#EF4444' }}>
              {isUp ? <Icon name="TrendingUp" size={10} /> : <Icon name="TrendingDown" size={10} />}
              {Math.abs(delta)}%
            </span>
          </div>
        </div>
      );
    }

    function Budget() {
      const { budgetAllocation, setBudgetAllocation, scenarioBudget, setScenarioBudget } = useDashboard();
      const EFFICIENCY = { 'Meta Ads': { leadsPerCr: 153, bookingRate: 0.074, revenuePerBooking: 3.0 }, 'Google Ads': { leadsPerCr: 128, bookingRate: 0.090, revenuePerBooking: 3.0 }, 'Organic': { leadsPerCr: 0, bookingRate: 0.098, revenuePerBooking: 3.0 }, 'Referral': { leadsPerCr: 335, bookingRate: 0.117, revenuePerBooking: 3.0 }};
      
      const channels = Object.keys(budgetAllocation);
      const allocations = channels.map(ch => ({ channel: ch, pct: budgetAllocation[ch], spend: parseFloat((scenarioBudget * budgetAllocation[ch] / 100).toFixed(2)) }));
      
      const projections = allocations.map(a => {
        const eff = EFFICIENCY[a.channel];
        const leads = a.channel === 'Organic' ? Math.round(a.spend * 40) : Math.round(a.spend * eff.leadsPerCr);
        const bookings = Math.round(leads * eff.bookingRate);
        const revenue = parseFloat((bookings * eff.revenuePerBooking).toFixed(1));
        const roas = a.spend > 0 ? parseFloat((revenue / a.spend).toFixed(2)) : 0;
        return { ...a, leads, bookings, revenue, roas };
      });

      const handleSlider = (ch, val) => {
        const newVal = parseInt(val);
        const remaining = 100 - newVal;
        const others = channels.filter(c => c !== ch);
        const currentOtherTotal = others.reduce((s, c) => s + budgetAllocation[c], 0);
        const newAlloc = { ...budgetAllocation, [ch]: newVal };
        if (currentOtherTotal > 0) {
          others.forEach(c => { newAlloc[c] = Math.max(0, Math.round((budgetAllocation[c] / currentOtherTotal) * remaining)); });
        }
        const total = Object.values(newAlloc).reduce((s, v) => s + v, 0);
        if (total !== 100) { const diff = 100 - total; const lastOther = others[others.length - 1]; newAlloc[lastOther] = Math.max(0, newAlloc[lastOther] + diff); }
        setBudgetAllocation(newAlloc);
      };

      return (
        <div className="slide-in" style={{ padding: 24 }}>
          <SectionTitle sub="Simulate budget reallocation · Projected output per channel">Budget Optimization Simulator</SectionTitle>
          <Card style={{ marginBottom: 16 }}>

                  <span style={{ color: '#94A3B8', fontSize: 16 }}>Cr</span>
                </div>
              </div>
              <div style={{ display: 'flex', gap: 24, marginLeft: 'auto' }}>
                {[ { label: 'PROJECTED LEADS', value: projections.reduce((s,p)=>s+p.leads,0).toLocaleString('en-IN'), color: '#3B82F6' },
                   { label: 'PROJECTED BOOKINGS', value: projections.reduce((s,p)=>s+p.bookings,0), color: '#22C55E' },
                   { label: 'PROJECTED REVENUE', value: `₹${projections.reduce((s,p)=>s+p.revenue,0).toFixed(1)} Cr`, color: '#C9A84C' } ].map((kpi, i) => (
                  <div key={i} style={{ textAlign: 'center' }}>
                    <div style={{ color: '#475569', fontSize: 10, fontWeight: 700, letterSpacing: '0.06em', marginBottom: 4 }}>{kpi.label}</div>
                    <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 18, fontWeight: 700, color: kpi.color }}>{kpi.value}</div>
                  </div>
                ))}
              </div>
            </div>
          </Card>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 16 }}>
            <Card>
              <div style={{ color: '#94A3B8', fontSize: 13, fontWeight: 600, marginBottom: 18 }}>Allocation Controls</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
                {channels.map(ch => (
                  <div key={ch}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8, alignItems: 'center' }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                        <div style={{ width: 10, height: 10, borderRadius: '50%', background: CHANNEL_COLORS[ch] }} />

          </div>
          <div style={{ position: 'relative' }}>
            <input type="range" min={min} max={max} step={step} value={value} onChange={e => onChange(Number(e.target.value))} style={{ width: '100%', accentColor: color, cursor: 'pointer' }} />
          </div>
        </div>
      );

      return (
        <div className="slide-in" style={{ padding: 24 }}>
          <SectionTitle sub="Adjust key variables and instantly see projected business impact">What-If Scenario Engine</SectionTitle>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 16 }}>
            <Card accent>
              <div style={{ color: '#94A3B8', fontSize: 13, fontWeight: 600, marginBottom: 20 }}>⚙️ Scenario Variables</div>
              <SliderRow label="Marketing Budget" value={scenarioBudget} min={5} max={100} step={0.5} onChange={setScenarioBudget} format="currency" color="#3B82F6" />
              <SliderRow label="Lead Conversion Rate" value={scenarioConvRate} min={1} max={25} step={0.1} onChange={setScenarioConvRate} format="pct" color="#22C55E" />
              <SliderRow label="Lead Volume" value={scenarioLeadVol} min={500} max={15000} step={100} onChange={setScenarioLeadVol} format="number" color="#C9A84C" />
            </Card>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              <div style={{ color: '#94A3B8', fontSize: 13, fontWeight: 600, marginBottom: 4 }}>📊 Projected Impact</div>
              {[
                { label: 'PROJECTED LEADS', val: scenarioKPIs.projectedLeads.toLocaleString('en-IN'), delta: deltaLeads, color: '#3B82F6' },
                { label: 'PROJECTED BOOKINGS', val: scenarioKPIs.projectedBookings, delta: deltaBookings, color: '#22C55E' },
                { label: 'PROJECTED REVENUE', val: `₹${scenarioKPIs.projectedRevenue} Cr`, delta: deltaRevenue, color: '#C9A84C' }
              ].map((kpi, i) => (
                <div key={i} className="kpi-card" style={{ borderLeft: `3px solid ${kpi.color}`, padding: '14px 16px' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <div>
                      <div style={{ color: '#475569', fontSize: 10, fontWeight: 700, letterSpacing: '0.06em', marginBottom: 4 }}>{kpi.label}</div>
                      <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 20, fontWeight: 700, color: kpi.color }}>{kpi.val}</div>
                    </div>
                    <div style={{ textAlign: 'right' }}>
                      <div style={{ color: '#475569', fontSize: 10, marginBottom: 4 }}>vs. Baseline</div>
                      <div style={{ color: Number(kpi.delta) >= 0 ? '#22C55E' : '#EF4444', fontFamily: 'JetBrains Mono, monospace', fontSize: 14, fontWeight: 700 }}>
                        {Number(kpi.delta) >= 0 ? '+' : ''}{kpi.delta}
                      </div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function UploadModule() {
      const { setUploadedData } = useDashboard();
      const [stage, setStage] = useState('idle');
      const [file, setFile] = useState(null);
      const [rawRows, setRawRows] = useState([]);
      const [headers, setHeaders] = useState([]);
      const [mapping, setMapping] = useState({});
      const [dragOver, setDragOver] = useState(false);
      const [error, setError] = useState('');
      const fileRef = useRef();
      const REQUIRED_FIELDS = ['date', 'leads', 'bookings', 'revenue', 'channel'];

      const handleFile = (f) => {
        if (!f) return; setFile(f); setStage('parsing'); setError('');
        Papa.parse(f, { header: true, skipEmptyLines: true,
          complete: (result) => {
            if (!result.data?.length) { setError('File appears empty.'); setStage('error'); return; }
            const hdrs = result.meta.fields || [];
            setHeaders(hdrs); setRawRows(result.data);
            const autoMapObj = {};
            hdrs.forEach(h => {
              const norm = h.toLowerCase().trim();
              if (norm.includes('date') || norm.includes('month')) autoMapObj['date'] = h;
              if (norm.includes('lead')) autoMapObj['leads'] = h;
              if (norm.includes('book')) autoMapObj['bookings'] = h;
              if (norm.includes('rev')) autoMapObj['revenue'] = h;
              if (norm.includes('chan') || norm.includes('source')) autoMapObj['channel'] = h;
            });
            setMapping(autoMapObj); setStage('mapping');
          },
          error: (err) => { setError(err.message); setStage('error'); }
        });
      };

      const applyData = () => {
        const missing = REQUIRED_FIELDS.filter(f => !mapping[f]);
        if (missing.length) { setError(`Missing required fields: ${missing.join(', ')}`); return; }
        
        const monthlyParsed = {};
        rawRows.forEach(row => {
          const m = row[mapping['date']] || 'Unknown';
          const ch = row[mapping['channel']] || 'Mixed';
          if (!monthlyParsed[m]) monthlyParsed[m] = { month: m, leads: 0, bookings: 0, revenue: 0, channel: ch };
          monthlyParsed[m].leads += parseInt(row[mapping['leads']]) || 0;
          monthlyParsed[m].bookings += parseInt(row[mapping['bookings']]) || 0;
          monthlyParsed[m].revenue += parseFloat(row[mapping['revenue']]) || 0;
        });

        setUploadedData({ monthly: Object.values(monthlyParsed), channels: null, campaigns: null });
        setStage('done');
      };

      return (
        <div className="slide-in" style={{ padding: 24 }}>
          <SectionTitle sub="Upload your CRM or marketing data · Auto column mapping">Data Upload</SectionTitle>
          
          {stage === 'idle' && (
            <Card>
              <div className={`upload-zone ${dragOver ? 'drag-over' : ''}`} style={{ padding: 48, textAlign: 'center', cursor: 'pointer', borderRadius: 8 }}
                   onDragOver={e => { e.preventDefault(); setDragOver(true); }} onDragLeave={() => setDragOver(false)}
                   onDrop={e => { e.preventDefault(); setDragOver(false); handleFile(e.dataTransfer.files[0]); }}
                   onClick={() => fileRef.current.click()}>
                <input ref={fileRef} type="file" accept=".csv" style={{ display: 'none' }} onChange={e => handleFile(e.target.files[0])} />
                <Icon name="Upload" size={40} color="#2E3A4E" style={{ margin: '0 auto 16px' }} />
                <div style={{ color: '#94A3B8', fontSize: 15, fontWeight: 600, marginBottom: 8 }}>Drop your .CSV file here or click to browse</div>
              </div>
            </Card>
          )}

          {stage === 'mapping' && (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 16px', background: '#22C55E11', border: '1px solid #22C55E33', borderRadius: 8 }}>
                <Icon name="FileText" size={16} color="#22C55E" />
                <span style={{ color: '#94A3B8', fontSize: 12 }}><strong style={{ color: '#F1F5F9' }}>{file?.name}</strong> · {rawRows.length} rows</span>
              </div>
              <Card>
                <div style={{ color: '#94A3B8', fontSize: 13, fontWeight: 600, marginBottom: 14 }}>Map Columns to Fields</div>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                  {REQUIRED_FIELDS.map(f => (
                    <div key={f} style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                      <div style={{ width: 120, fontSize: 12, color: '#E2E8F0', fontWeight: 600 }}>{f}<span style={{ color: '#EF4444' }}> *</span></div>
                      <select className="input-field" style={{ flex: 1 }} value={mapping[f] || ''} onChange={e => setMapping(prev => ({ ...prev, [f]: e.target.value }))}>
                        <option value="">— skip —</option>
                        {headers.map(h => <option key={h} value={h}>{h}</option>)}
                      </select>
                    </div>
                  ))}
                </div>
              </Card>
              {error && <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '10px 14px', background: '#EF444411', border: '1px solid #EF444433', borderRadius: 8 }}><Icon name="AlertCircle" size={14} color="#EF4444" /><span style={{ color: '#EF4444', fontSize: 12 }}>{error}</span></div>}
              <div style={{ display: 'flex', gap: 10 }}>
                <button className="btn-primary" onClick={applyData}>Apply Data & Refresh</button>
                <button className="btn-ghost" onClick={() => setStage('idle')}>Cancel</button>
              </div>
            </div>
          )}

          {stage === 'done' && (
            <Card style={{ textAlign: 'center', padding: 48 }}>
              <Icon name="CheckCircle" size={48} color="#22C55E" style={{ margin: '0 auto 16px', display: 'block' }} />
              <div style={{ color: '#F1F5F9', fontSize: 18, fontWeight: 600, marginBottom: 8 }}>Dashboard Updated Successfully</div>
              <button className="btn-primary" onClick={() => { setUploadedData(null); setStage('idle'); }}>Revert to Default Data</button>
            </Card>
          )}
        </div>
      );
    }

    // --- APP ORCHESTRATOR ---
    const MODULE_MAP = { overview: Overview, marketing: Marketing, funnel: Funnel, attribution: Attribution, revenue: Revenue, leakage: Leakage, budget: Budget, whatif: WhatIf, upload: UploadModule };

    function DashboardContent() {
      const { activeModule } = useDashboard();
      const ActiveModule = MODULE_MAP[activeModule] || Overview;
      return (
        <div style={{ display: 'flex', minHeight: '100vh', background: '#0A0C10' }}>
          <Sidebar />
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
            <TopBar />
            <main style={{ flex: 1, overflowY: 'auto' }}><ActiveModule key={activeModule} /></main>
          </div>
        </div>
      );
    }

    function App() { return <DashboardProvider><DashboardContent /></DashboardProvider>; }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
